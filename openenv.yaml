spec_version: 1
name: commerce-ops-v2
type: environment
runtime: docker
app: server/app.py
port: 7860

tasks:
  - id: triage_task
    name: "Customer Ticket Triage"
    description: "Resolve all open customer support tickets by issuing refund actions."
    difficulty: easy
    grader:
      module: ecom_env
      function: grade_triage_task

  - id: inventory_task
    name: "Inventory Management"
    description: "Maintain the target SKU stock at or above the configured safety threshold."
    difficulty: medium
    grader:
      module: ecom_env
      function: grade_inventory_task

  - id: profit_task
    name: "Profit Maximization"
    description: "Grow the bank balance beyond the initial seed capital over a 50-day cycle."
    difficulty: hard
    grader:
      module: ecom_env
      function: grade_profit_task
